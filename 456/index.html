<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>甘特圖（無限拖曳版）</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.header-row {
  display: flex;
  margin-bottom: 5px;
}

.header-task {
  width: 200px;
}

.header-day {
  flex: 1;
  text-align: center;
  font-weight: bold;
}

.row {
  display: flex;
  margin-bottom: 10px;
}

.task {
  width: 200px;
  background: #f5f5f5;
  padding: 8px;
}

.track {
  flex: 1;
  height: 40px;
  border: 1px solid #ddd;
  position: relative;
  background-image: linear-gradient(to right, #eee 1px, transparent 1px);
  background-size: calc(100% / 7) 100%;
}

.bar {
  position: absolute;
  height: 100%;
  background: #4CAF50;
  cursor: grab;
}

.resize {
  width: 8px;
  height: 100%;
  position: absolute;
  right: 0;
  top: 0;
  cursor: ew-resize;
  background: rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<h2 contenteditable="true">上架流程甘特圖（可無限拖曳）</h2>

<!-- Header -->
<div class="header-row">
  <div class="header-task"></div>
  <div class="header-day">Day1</div>
  <div class="header-day">Day2</div>
  <div class="header-day">Day3</div>
  <div class="header-day">Day4</div>
  <div class="header-day">Day5</div>
  <div class="header-day">Day6</div>
  <div class="header-day">Day7</div>
</div>

<div id="gantt"></div>

<script>
const tasks = [
"廠商洽談",
"簽約 / 確認合作",
"商品資料收集",
"後台建檔",
"倉庫入倉",
"上架審核",
"正式上架"
];

const gantt = document.getElementById("gantt");

tasks.forEach(task => {

  const row = document.createElement("div");
  row.className = "row";

  const taskDiv = document.createElement("div");
  taskDiv.className = "task";
  taskDiv.contentEditable = true;
  taskDiv.innerText = task;

  const track = document.createElement("div");
  track.className = "track";

  const bar = document.createElement("div");
  bar.className = "bar";
  bar.style.width = "100px";
  bar.style.left = "0px";

  const resize = document.createElement("div");
  resize.className = "resize";
  bar.appendChild(resize);

  track.appendChild(bar);
  row.appendChild(taskDiv);
  row.appendChild(track);
  gantt.appendChild(row);

  let isDragging = false;
  let isResizing = false;
  let startX, startLeft, startWidth;

  bar.addEventListener("mousedown", (e) => {
    if (e.target === resize) return;
    isDragging = true;
    startX = e.clientX;
    startLeft = bar.offsetLeft;
  });

  resize.addEventListener("mousedown", (e) => {
    e.stopPropagation();
    isResizing = true;
    startX = e.clientX;
    startWidth = bar.offsetWidth;
  });

  document.addEventListener("mousemove", (e) => {
    if (isDragging) {
      let dx = e.clientX - startX;
      bar.style.left = (startLeft + dx) + "px";
    }

    if (isResizing) {
      let dx = e.clientX - startX;
      bar.style.width = (startWidth + dx) + "px";
    }
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
    isResizing = false;
  });

  bar.addEventListener("dblclick", () => {
    let color = prompt("輸入顏色（例如 red 或 #ff0000）:");
    if (color) bar.style.background = color;
  });

});
</script>

</body>
</html>
